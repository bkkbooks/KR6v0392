body:
  text: 巡按福建監察御史臣李嗣京訂正知長樂縣事臣夏允彛參閲知建陽縣事臣黃國琦較釋帝王部五十二崇釋氏第二唐肅宗至德中內置道場供奉僧晨夜念佛動數百人聲聞禁外中書侍郎平章事張鎬知之奏曰臣聞天子修福當在安養含生靖一風化未聞區區僧教以致太平伏願陛下以無為為心不以小乘撓聖慮也肅宗甚然之上元二年四月甲申詔於唐興寺設高座講論二教七月癸巳於景龍觀設高座講論道釋二教代宗寶應元年八月癸酉詔曰道釋二教用存善誘至於像設必在尊崇如聞州縣公私多借寺觀居止因茲褻黷切宜禁斷務令清肅其寺觀除三綱并老病不能支持者餘並仰每日二時行道禮拜如有弛慢並量加科罰時天下公私等事多借寺觀居止代宗恐其褻黷因詔又詔曰教宗清淨禮避嫌疑其僧尼道士非本師教主及齋會禮謁不得妄託事故輒有往來非時聚會並委所繇官長勾當所有犯者準法處分亦不得因茲攪擾分明告示咸使知悉廣德元年七月壬子大赦改元制河南河北偽度僧尼道士女冠並與正度二年四月壬申以玄宗諱日度僧道凡數百人乙酉以肅宗諱日度僧道凡數百人永泰元年九月於京城資聖西明兩寺置百高座講仁王經內出二寶輿中命有力者衣金甲舁出又結彩為菩薩神王及八部鬼神羊車鹿車牛車內侍魚朝恩護送宰臣及百官列班於光順門觀禮宰臣等表請依班序節級率錢以資僧供二七日而罷又詔宰臣及兩省五品已上官尚書省四品已上官御史大夫中丞諸司長官並於西明寺行香修齋奏樂竟日而罷俄以吐蕃回紇入寇罷百高座講經十月復講經於資聖寺大曆三年正月乙丑帝幸章敬寺行香凡度僧尼一千人二月辛丑萬年縣鎮國寺有胡僧純陀自言六百歲臨終遣弟子詣闕以衣鉢傳奉皇帝帝遣中官以紫衣賜之又遣中官弔祭并護葬事是月興善寺不空三藏上言寺院佛塔先因地震陷折今將增修下見古埏得一小棺其長尺餘發而視之凡積十餘重棺皆金寶裝飾中有舍利骨及佛髮一條色青而拳其長數尺每棺一鎖規製妙絶有殷仲文題贊處甲辰內出寶輿具威儀迎入內道場奉之七月特賜章敬寺盂蘭盆時寺宇新成帝增罔極之思勑百官詣寺行香四年正月帝以章敬皇太后忌辰度僧尼道士凡四百人是月以修功德使大濟禪師廓清簡較殿中監廓清京城興唐寺僧也以修功德承恩特賜袈裟及廄馬出入禁中無時初賜號大濟至是又寵以班秩京師諸僧咸憚之二月南天竺國僧三藏文殊德上言廣州南界蕃人新營兩寺望賜寺名詔以寶應廣德二名賜之七月庚申文成殿置道場為萬姓祈福是日佛見光相自子至丑久而不散六宮近侍咸覩文武百官尚書左僕射裴冕等表賀曰聖德動天湛恩育物齋心甲夜稽首梵筵助玄造於慈元登蒼生以壽域休徵允答聖功契符騰神光於玉毫發睟容於金殿宮中咸覩夜後如初臣等得奉殊祥無任歡欣之至伏請編諸史册宣示中外手詔答曰朕嗣守鴻業恭臨寶位夕惕若厲蹈乎春氷啓三乘之真如為萬姓以作福大雄感應示現毫光茂對禎祥多慙薄德卿等百辟勤修庶政休徵薦集慶慰當深所請編之史册宣示中外者依七年正月興善寺僧特進試鴻臚卿三藏不空獻所翻譯佛經特許編入一切經目不空表曰爰自幼年承事先師大弘三教和尚二十有四載稟授瑜伽法門後遊五天尋求所未授者外諸經論更重學習凡得梵本瑜伽真言經論五百餘部奉為國家詳譯聖言廣崇福祐天寶五載却至上都奉玄宗皇帝恩命於宮內建立灌頂道場所齎梵經𥁞許翻譯及肅宗皇帝配天繼聖特奉綸音於內道場建立護摩及灌頂法又為國譯經助宣皇化其所譯金剛灌頂瑜伽法門是成佛速邪之路其修行者必能䪺超凡境達於彼岸餘部真言諸佛方便其徒不一所譯諸大乘經典皆是上資邦國息滅災厄星辰不愆風雨順序仰恃佛力輔成國家謹集前後所翻譯自開元至今凡一百一卷七部以聞詔下有司宣付中外八年正月乙未勑天下寺觀僧尼道士不滿七人者宜度滿七人三七人已上者更度一人二七人以下者更度三人五月庚子以太宗諱日命有司修四千僧齋於服成寺八月戊午修一萬僧齋於慈恩寺為萬姓祈福九年丙戌以肅宗諱日度僧尼道士凡二百餘人六月癸未興善寺僧試鴻臚寺卿不空三藏卒輟朝三日不空西域胡僧也敏智多聞學通釋氏經論曉知蕃漢音旨翻譯貝葉經凡數萬言帝甚敬之及卒乃下詔曰大道之行同合於異相王者至理總歸於正法方化成之齊致何儒釋之殊塗故前代帝王罔不崇信法教弘闡與時偕行特進試鴻臚卿大興善寺三藏沙門大廣智不空我之宗師人之舟楫超詣三學坐離于見聞修持萬行嘗示於化滅執律捨縛護戒為儀繼明善教之志來受人王之請朕在先朝早聞道要及當付囑嘗所歸依每每執經內殿開法前席憑几同膠序之禮順風比崆洞之問而妙音圓演密行內持待扣如流自涯皆悟滌除昏妄調伏魔冤天人洗心於度門龍鬼受職於神印固以氣消災厲福致吉祥實惟弘我之多寧止利吾之美當有命秩用伸優禮而得師為盛味道滋深思復強名載明前志夫妙界有莊嚴之士內品有果地之儀本乎尚德敬順時典可開府儀同三司仍封肅國公贈司空諡曰大辨正廣智不空三藏和尚德宗貞元四年八月御通化門觀章敬寺迎御書院額并鼓吹閲神䇿馬技五年三月詔曰釋道二教福利群生館宇經行必資嚴潔自今州府寺觀不得宿客居住屋宇破壞各隨事修葺八月詔天下諸上州並冝國忌日準式行香六年二月乙亥詔葬佛骨於岐陽初岐陽有佛指骨寸餘葬於無憂王寺或奏請出之以示衆帝乃出之置於禁中精舍又送於京師佛寺傾都瞻拜施財物纍巨萬是日命中官送歸岐陽左神䇿行營節度使鳳翔尹邢君牙迎護葬於舊所八年七月丁卯幸章敬寺九年五月賜故杭州徑山寺僧法欽諡日大覺禪師六月詔定國忌日寺觀齋僧道人數有差十二年九月右神䇿等軍上言宴設堂去年臘日蒙車駕臨幸請置寺以貞元鎮國為名從之又詔州閿鄉縣龍興寺故阿足師宜諡大圓禪師十三年四月於曲江南彌勒閣置寺以貞元普濟為名七月右神䇿軍中尉霍仙鶴患特賜馬十匹令諸寺設齋祈福十月景公寺僧寂寬等於京兆府狀訴綱維乾俊等典賣承前勑賜御衣府司推勘所典賣並緣嘗住寺用禁繫乾俊等奏請科罪帝曰本來施與寺家之物若自盜竊法律有文今乃不為私情事緣嘗住正當施與之意豈合書以罪名若施與面令存乃是勞力寺家殊非本施之意僧之言告乃是無知更欲科繩深所無謂宜並釋放十四年正月南天竺國先進華嚴經殊梵本僧般若三藏領到令保壽寺僧智柔圓照道監虛舟智通等十八人同於崇福寺翻譯成四十卷十六年四月以故第二祖惠可禪師賜諡為大祖禪師憲宗元和二年九月乙巳許成都府置聖壽南平二佛寺三年三月辛亥河中僧惠琳撰一切經音并目録一百三卷表獻之六年正月丁巳勑諫議大夫孟簡給事中劉伯芻工部侍即歸登右補闕蕭俯同就醴泉佛寺閲翻譯大乘本心地觀經十年三月甲申西明佛寺僧遷寺中之毗沙門神像於開業寺帝命假之騎軍前後翼衛其徒以幢蓋引侍凡數里不絶觀者傾都五月詔京城寺觀講冝準興元元年九月一日勑處分諸畿縣講宜勒停其觀察使節度州每三長齋月任一寺一觀置講餘州悉停惡其聚衆且虞變也十二年二月丙申置元和聖壽佛寺於右神䇿軍五月賜興佛寺布一百端匹十三年四月甲寅幸興福寺賜絹三百匹辛酉西市百姓於芳林門為無遮僧齋命中使以香施之十二月庚戌僧惟應等辭赴鳳翔法門寺迎佛骨命高品中使杜英琦監焉是月癸亥命中使齎香監領宮人十三人赴臨臯驛迎佛骨先是功德使奏鳳翔府法門寺有護國真身塔塔內有釋迦牟尼佛指骨一節其本傳以為當三十年一開開則歲豐人安至來年合發詔許之及至又命中使領禁兵與僧徒迎護開光順門以納之留禁中二日乃送京城佛寺十四年四月乙卯御勤政樓觀都人設僧齋之會陳雜樂百戲日入而罷穆宗以元和十五年正月即位二月河東節度使裴度奏今月四日五臺山佛光寺側慶雲現中有金人乘後猊領徒千萬如金仙狀自巳至申方滅長慶三年八月自復道達興慶宮至通化門賜丐僧等二百匹遣中使劉克明以錢二百五十貫絹二百五十匹賜弘福寺以發新鐘十一月幸通化門觀作毗沙門神因賜絹五百匹十二月以錢一千貫賜章敬寺又賜毗沙門神額曰毗沙天王導以幡幢帝御望仙門觀之遂舉樂雜戲角抵極歡而罷敬宗寶曆元年二月己卯賜化度寺經院金字額寶曆聖福之院功德使具雜戲聲樂迎以赴寺帝御日迎樓觀之丁亥詔兩街佛寺置方等受戒壇場自三月十日至四月十日停仍令兩街功德使各選擇有戒行僧謂之大德者考試僧能暗記經一百五十紙尼能暗記經一百紙即令與度此事停廢已久所在長吏方喜耕織者稍衆今忽重置蓋寶壽寺僧法真因道場修功德奏論得請也八月己丑蓬萊殿會沙門道士共四百人賜食兼給茶有差二年三月庚午鄭滑觀察使李聽上言隋大業初高祖神堯皇帝任鄭州刺史日為太宗文皇帝疾恙祈福於滎陽縣太海佛寺其答如響因建一石像像下刊紀其事凡十六字歲月既遠𥁞翳於土壤中今滎陽縣令李元慶新加嚴飾刺史張仲方立石為文不敢不奏文宗太和元年十月江西奏洪州道一禪師元和中賜諡大寂其塔未蒙賜額詔賜名圓證之塔二年七月浙西道觀察使李德裕奏潤州鶴林寺故禪師玄素傳牛頭山第五祖智威心法是徑山大覺之師伏請依釋門例賜諡號大額勑宣賜諡大律禪師大寶般若之塔十月河中觀察使薛平奏中條山蘭若營造之初有兩泉湧出今因降誕請號為太和寺許之開成二年二月甲辰王彥進準宣索內典目録十二卷乙巳以太宗皇帝先置毗沙門神及功德在蓬萊殿是日移出配諸寺安置三月甲戌以彗星見命京師諸佛寺開仁王經道場宣宗以會昌六年即位五月勑上都添僧尼寺一所每寺三十人大中元年閏三月帝御紫宸殿謂宰臣曰佛雖異方之教深助理本所可存而勿論不欲過毀以傷令德乃遣下詔有會昌中靈山古迹招提棄廢之地並令復之委長吏擇僧之高行者居焉懿宗咸通十四年三月詔曰兩街僧道於鳳翔法門寺迎佛骨四月八日佛骨至京自開遠門達安福門迎禮之迎入內道場二日出於京城諸寺士女雲合威儀盛飾古無其比遂下制赦京畿及天下見禁囚徒後唐莊宗同光二年九月勑天下應有本朝所造寺觀宜令所在長吏取寺司嘗住物添修至萬壽節日須畢其功十一月甲戌河南尹張全義奏萬壽節於嵩山開琉璃戒壇度僧百人勑張全義首冠王臣心明佛性資善弘於淨衆增福聚於皇基將欲壇啓琉璃人銓鴛鷺實彰忠節宜示兄俞十二月乙亥幸廣化寺祈雪二年正月幸鄴都登黎陽山燔香於大像前五月戊申幸龍之廣化寺開佛塔請雨明宗天成元年十一月勑佛氏之教其來久矣既為空寂之門不無高潔之士自淳風久散至道莫隆漸容遊惰之徒雜處緇黃之衆罔尊禁戒唯切經求託形勢以擾人蓄資財面潤已將思縱志肯樂聚居多於閭巷之間別搆住持之所妄陳福業潛誘聾愚或移動居人或侵并物業如斯之弊其徒日繁朕方靜寰區務康黎庶貴臻有益共洽無𥝠冝令遍行告論應今日已前修蓋得寺院無令毀廢自此已後不得輒有建造如要願在僧門亦宜準佛法條例官壇受戒不得擅𥝠剃度二年九月益州孟之祥令僧五人持佛牙長一寸六分云僖宗幸蜀時留之今屬應聖嘉節願資壽命宣示近臣十月五臺山王子寺主僧人廷果狀稱為先師廣法大師誠惠建塔請名諡為法雨大師慈雲之塔四年八月澤州盤亭山千峯禪寺僧洪密狀奏當院創感應舍利塔一所乞賜塔額乃賜號為圓空之塔長興四年七月命中使押絹五百匹施五臺山僧齋料末帝清泰元年七月遣供奉官鄭延遂往鳳翔詔胡僧阿闍黎初帝在籓屢與僧言闍黎行高知前事帝深重之九月詔鳳翔發遣僧祐聖大師至京師二年正月千秋節樞密使趙延壽獻金繒并大乘經十卷欣州刺史劉處讓獻金字法華經一部太原多僧舍資福一宗尤事禪譯文武間好佛者多湊其門帝頗宗奉及鎮河中鳳翔僧知數者數言帝有金輪之位岐僧阿闍黎言事多從故延壽處讓有是貢獻四月丙寅河中棲巖寺弘福院僧惠鑒言先師在龍潛時施財起塔奏號靈應之塔師未有諡詔賜諡真寂丁卯遣供奉官李彥驥鳳翔法門寺飯僧尼道俗帝舊遊故也乙酉功德使言左右街僧録可肇報在京諸寺院童子行者於千春節考録及限各給得文許令披剃及僧尼沙彌年滿二十受具戒伏乞開置官壇緣四月十五日僧門結夏至七月十五日方滿至千春節前開置戒壇從之時功德使奏每年誕節諸州府奏薦僧道其僧尼欲立講論科講經科表白科文章應制科持念科禪剎聲讚科道士女冠經法科講論科文章應制科表白科聲讚科焚修科以試其能否從之八月杭州錢元瓘言襲爵四年曾無顯效爰鳳池之真命降龍册以雙封臣特於府城外造寺一所前百步起樓號奉固其寺額乞以龍册為名詔曰錢元瓘效忠建寺比為誕節齋僧龍册為名未稱勤懇冝號千春寺十月鳳翔言僧阿闍黎卒帝嗟惜之命翰林學士為志石三年遣供奉官劉處賓往鳳翔法門寺四月八日設大齋會普高祖天福二年正月勑西天中印土摩竭陀舍衛國大菩提寺三藏陀闍黎賜紫沙門室利縛羅上靺下剌冝賜號弘梵大師十一月于闐國僧曼哥羅嘗羅賜紫號昭梵大師三年十一月庚午西京左右街僧録可肇等齎佛牙到闕宣付汴京𭣣掌十二月戊子勑河陽邢州潛龍舊宅先令選名僧住持冝賜院額其河陽曰開晉禪院邢州曰廣法禪院四年二月庚子以天和節僧尼賜紫衣師號者一百有五寺宇賜名額者凡二十有三襄州香界延州衆寶邢州普會相州安福懷州普護鳳翔寶蓮鄭州妙香棣州淨念洛州天花汾州普照雒京廣福鳳州弘利京兆悟空并州定果徐州空寂宋州普福遼州澄節許州菩提靖教陳州花臺定業東京金明善會十二月丙辰勑凡為精舍將結勝緣清虛則神亦相依混亂則人皆不重其或偶然乘興率爾棲心鄉村接漁獵之家鄽里定屠沽之戶佛雖無染僧豈不輕冝崇釋梵之因永肅人天之化所有自前院宇即且依舊住持今後城郭村坊一切不得創造五年二月甲子天和節道釋賜紫衣師號者凡九十人寺宇賜名額者凡二十五所東京寶繩寶像寶花法林西京惠雪京兆普靜兗州等覺玄機蔡州吉祥懷州妙理襄州護國許州定水貝州寶剎傳州金繩耀州密行代州仁壽鄴州感化潞州妙士定州毗城岐州善覺遺相澤州解空慈州集聖鄆州真覺四月癸卯建金界寺於五臺立峻極院於嵩嶽六年二月戊午天和節道釋賜紫衣師號者凡百三十有四寺宇賜名額者凡五十有九東京淨聖資壽西京仁聖青蓮延慶北京靜覺鳳翔弘化定州法海孟州興惠趙州興法襄州延壽延州興果相州妙勝潞州慈雲汝州清涼安州竺乾陝州仁壽邢州間心濮州樂壽五月甲辰加隰彌陀國僧㗌哩以佛牙泛海而至十二月壬子遣內班史延韜部署僧十四人宗城縣開置道場以鎮人為安重榮脅制而有殺戮崇其福事七年正月遣內班衛延韜鎮州開置水陸道場三月壬子天和節三京諸道州府奏僧尼道士乞紫衣師號凡百人寺觀名額五十餘處悉從之五月乙未秦州侯益奏臣頃歲魯為偏將往伐叛逆有願如范延光歸降兵無血刃即於招討使楊光遠中軍寨建一佛剎自後延光果能歸欵克契發心光遠尋施錢三百貫文與臣共力營葺今修成天王院一所乞賜名額勑以福順天王院為名少帝開運二年六月定州奏據郎山招收指揮使孫方簡狀當山有僧院地居山谷道扼鄉閭自蕃戎騷動已來邊界驚移之後多聚強壯自辦戈矛每遇賊軍皆獲勝捷其郎山為昜州之中路滿縣之鄰封通此往來最為要害乞賜院額者勑以勝福之院為名漢隱帝乾祐二年太子率更令李守瓔上言二事其一沙門著紫比非佛門貴務奢華以邀名利諸處奏薦蓋出顏情以臣愚見不敢便望止絶每歲誕節前據所奏薦便令其身隨薦章詣闕令功德使召兩院僧官考試所業長短以行恩澤庶絶濫舉之門周太祖廣順二年十一月以在京潛龍宅為佛宮賜額號天聖禪寺三年十一月中印寺僧法進賜紫衣世宗顯德元年三月親征河東四月丁巳幸團柏谷佛寺賜主寺僧紫衣九月以潛龍宮為皇建禪院遣沙門清興主之是月齊州沙門義楚進釋氏六帖三十卷義楚少負名操亦通儒學將佛書麗事以類相從擬白氏儒書所集帝覽而嘉之賜以紫衣其書付史館四年十月賜京城內新四寺額以天清顯靜顯寧聖壽為名五年四月征淮南回戊午至泗州幸普光王寺賜寺僧帛有差六月庚午內出御衣六百餘事錢四十萬羅穀百匹分賜兩街僧道令僧道修寺觀六年四月幸滄州駐蹕於乾寧軍賜于城內二寺名額一日迎鑾二日順聖從寺僧之請也崇釋老司馬遷之序六家談大道之要其論詳矣自竺乾之典流于中夏述苦空之旨顯悲濟之用奉其教者又豈勝道哉江表之世崇尚斯篤乃至增建淨剎講求梵譯度桑門之衆申血食之業營齋造像極其信向而玄元之訓亦資演暢東魏北齊暨于朱氏何莫繇斯也已其或𡨋符玄感神期吻合肹蠁之應非可度思若乃殖衆德之本以濟於仁恕洞無為之妙以臻于清淨斯固有助於治者也吳大帝赤烏十年胡人康僧會入境置經行所朝夕禮念有司以聞帝曰昔漢明感夢金人使往西方求之得摩騰空竺法蘭來中國立經行教今無乃是遺類乎因引見僧會具言佛教滅度已久唯有舍利可以求請遂於大內立壇結靜三七日得之帝崇佛道以是江東初有佛法宋文帝元嘉十二年丹陽尹蕭摹之奏曰佛化被于中國已歷四代而自頃以來更以奢競為重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舍皆先列言須許報然後就功詔可又沙汰沙門罷道者數百人孝武帝孝建元年率群臣於中興寺八關齋中食會侍中袁愍孫即袁粲舊名與黃門郎張淹更進魚肉尚書令何尚之奉法素謹密以白帝帝使御史中丞王謙之糾奏並免官大明二年有曇標道人與羌人高闍謀反帝因是下詔所在精加沙汰後有違犯嚴其誅坐於是設諸條禁自非戒行精苦並使還俗而諸寺尼出入宮掖交關妃后此制竟不能行明帝以宅起湘宮寺費極奢侈以孝武帝莊嚴剎七層帝欲起十層不可分立為兩剎各五層新安太守巢尚之罷郡還見帝曰卿至湘宮寺未我起此寺是大功德通直散騎侍郎虞願在側曰陛下起此寺皆是百姓賣兒貼婦錢佛若有知當悲哭哀愍有何功德尚書令袁粲在坐為之失色帝大怒使人驅下殿願徐去無異容以舊恩俄復召入帝頗好玄理以周顒有辭義引入殿內親近宿直帝所為毒之事顒不敢顯諫輒誦經中因緣罪福事帝亦為之小止南齊武帝時王奐為將軍欲請車駕幸府帝晚信佛法御膳不宰牲使王晏謂奐曰吾前去年為斷殺事不復幸詣大臣已判無容欻爾也梁高祖天監十六年四月初去宗廟牲詔曰夫神無嘗饗饗于克誠所以西鄰禴祭實受其福宗廟祭祀猶存牲牢無益至誠有纍𡨋道自今四時蒸嘗外可量代八座議以脯代一元大武八座又奏既停宰殺無復省牲之事請立省饌儀其衆官陪列並同省牲帝從之十月詔曰今雖無復牲腥猶有脯修之類即之幽明義為未𥁞可更詳定悉薦時蔬左丞司馬鈞等𭆤議大餅代大脯餘悉用蔬菜帝從之又舍人朱議二廟祀相承止有一餅羹蓋祭祀之禮應有兩羹相承止於一餅即禮為乖請加熬油蓴羹一餅帝從之於是起至敬殿景陽臺立七廟座月中再設清淨饌自是訖於臺城諸廟遂不血食中大通元年九月癸巳輿駕幸同泰寺設四部無遮大會上釋御服披法衣行清淨大捨以便省為房素牀瓦器乘小車私人執役甲午升講堂法座為四部大衆開涅槃經題十月己酉設四部無遮大會僧道五萬餘人會畢帝御金輅還宮二年四月幸同泰寺設平等會三年冬十月己酉行幸同泰寺高祖升法座為四部衆説大涅槃經義迄于乙卯十一月乙未行幸同泰寺高祖升法座為四部衆説摩訶般若波羅密經義迄于十二月辛丑五年二月癸未幸同泰寺設四部大會升法座發金字般若經題迄于己丑大同元年三月丙寅幸同泰寺設無遮大會四月幸同泰寺鑄十方銀像并設無礙會二年三月戊寅幸同泰寺設平等法會九月辛亥幸同泰寺設四部無礙法會十月壬午幸同泰寺設無礙大會三年五月癸未幸同泰寺鑄十方金像設無礙大會八月辛卯輿駕幸阿育王寺大赦天下四年五月癸亥詔以東治徒李裔之降如來真形舍利大赦天下五年扶南國王遣使貢獻又言其國有佛髮長一丈二尺詔遣沙門釋雲寶隨使往迎之先是三年八月高祖改造阿育王寺塔出舊塔下舍利及佛瓜髮髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形按僧伽經云佛髮青而細猶如藕莖絲佛三時經云我昔在官沐頭以尺量髮長一丈二尺故能右旋還成蠡文則與高祖所得同也阿育王即鐵輪王王閻浮提一天下佛滅度後一日一夜役鬼神造八萬四千塔此即其一也吳時有尼居其地為小精舍孫綝尋毀除之塔亦同泯吳平後諸道人復於舊處建立焉晉中宗初渡江更修飾之至簡文咸安中使沙門安法師程造小塔未及成而亡弟子僧顯繼而修立至孝武太元九年上金相輪及承露其後西河離石縣有胡人劉薩何遇疾暴亡而心下猶暖其家未敢便殯經七日更蘇説云有兩吏見録向西北行不測遠近至十八重地獄隨報重輕受諸楚毒見觀世音語云汝緣未𥁞第得活可作沙門從下齊城丹陽會稽並有阿育王塔可往禮拜若壽終則不墮地獄語竟如墮高嵩忽然醒寤因此出家名惠達遊行禮塔次至丹陽未知塔處乃登越城四望見長千里有異氣色因就禮拜果是育王塔所屢放光明繇是定知必有舍利乃集衆就掘入一丈得三石碑並長六尺中有一碑有鐵函函中又有銀函函中有金函盛三舍利及瓜髮各一枝髮長數尺即遷舍利近北對簡文所造塔西造一層塔十六年又使沙門僧尚伽為三層即高祖所開者也初穿土四尺得龍骨及昔人所拾金銀環釧叉録等諸雜寶物可深九尺許方至石碑碑下有石函函內有鐵壺以盛銀坩坩內有金𨩐罌盛三舍利如粟粒大圓正光潔函內又有琉璃碗碗內得四舍利及髮瓜瓜有四枚並為沉香色至其月二十七日高祖到寺禮拜設無遮大會大赦天下是日以金鉢盛水泛舍利其最小者隱鉢不出高祖禮數十拜舍利乃於鉢內放光旋回久之乃當鉢中止高祖問太僧正惠令日見不可思議事不惠令答曰法身嘗住湛然不動高祖曰弟子欲請一舍利歸臺供養至九月五日又於寺設無遮大會遣皇太子王侯朝貴等奉迎是日風景明和京師傾矚觀者百數十萬人所設金銀供具等物並寺供養并施錢一千萬為寺基業至四年九月十五日高祖又至寺設無遮大會𥪡二舍利塔各以金罌次玉罌重盛舍利及瓜髮內七寶塔中又以石函盛寶塔分下兩塔下及王侯妃主百姓富室所捨金銀釧等珍寶充積十一年十一月二日寺僧又請高祖於寺發般若經題尓夕二塔俱放光明敕鎮東將軍邵陵王綸製寺大功德碑文先是二年改造會稽鄭縣塔開舊塔出舍利遣光宅寺釋敬脫等四僧及舍人孫賑暫迎還臺高祖禮拜竟即送還縣入新塔下此縣塔亦是劉薩何所得也晉咸和中丹陽尹高悝行至張侯橋見浦中五色光長數尺不知何怪令人於光處愔視之得金像未有光趺悝乃下車載像還至長干巷首牛不肯進悝乃令馭人任牛所之牛竟牽車至寺悝因像至寺付寺僧每至中夜嘗放光明又間空中有金石之響經一歲臨海漁人張係世於海口忽見有銅花趺浮出水上係世取送縣縣以送臺乃施像足宛然會合簡文咸安元年交州合浦人董宗之採珠沒水於底得佛光艷交州押送臺以施像又合焉自咸和中得像至咸安歷三十餘年光趺始具初高悝得像後有西域胡僧五人來詣悝曰昔於天竺得阿育王造像來至鄴下值胡亂埋像於河邊今尋覔失所在五人當其夜俱夢見像已出江東為悝所得乃送此五僧至寺惠邃欲模寫像形寺主僧尚慮虧金色謂惠邃日若能令像放光回身西向乃可相許惠邃便㦝禱拜請其夜像即轉座放光回身西向且便許模之邊跌光有外國書莫有識者後有三藏即永跋摩識之云是育王為第四女所造也及大同中出舊塔舍利勑市寺側數百家以廣寺域造諸堂殿并瑞像周回閣等窮於輪奐焉其圖諸經變並吳人張僧繇運手繇丹青之工一時冠冕中大同元年三月庚戌法駕出同泰寺省講金字三會經夏四月丙戌於同泰寺解講設會太清元年三月庚子帝幸同泰寺設無遮大會帝升光嚴殿講堂坐師子座講金字三會經帝素歸心釋教每發誓願嘗云若有衆生應受諸苦悉諱身代當帝尤長釋典製涅槃大品淨名惠會諸義記復數百卷聽覽餘間即於重雲殿及同泰寺講説名僧願學四部聽衆嘗萬餘人元帝承聖三年九月辛卯於龍光殿述老子義尚書左僕射王褒為執經後梁宣帝察好學善屬文猶長於佛義著內典華嚴般若法華金光明義疏三十六卷遂行於世初察以嶽陽王鎮荊州甄玄成為察中記室參軍掌書記頗參政事後以江陵甲兵殷盛遂懷二心密與元帝具申誠欵或有得其書者送之於察察深信佛法嘗願不殺誦法華經人云玄成素誦法華遂以此獲免察復見之嘗曰甄公得法華經力陳高祖永定元年十月詔出佛牙於杜姥宅集四部設無遮大會高祖親出闕前禮拜初齊故僧統法獻於烏纏國得佛牙嘗在定林上寺梁天監末為攝山慶雲寺沙門惠興所得惠興將終以屬弟惠志及承聖末惠志密送于帝至是乃出二年十月輿駕幸莊嚴寺發金光明經題十二月甲子輿駕幸莊嚴寺設無遮大會捨乘輿法物群臣法駕奉迎即日還宮文帝天嘉四年四月設無遮大會於太極前殿後主太建十四年九月丙午設無遮大會東魏孝靜帝時杜弼為通直散騎嘗侍從高歡于晉陽歡命弼奉使詣闕帝見之於九龍殿曰朕始讀莊子便值奏名定是體道得真玄同齊物聞卿釋學聊有所問經中佛性法性為一為二弼對曰佛性法性止是一理詔又問曰佛性既非法性何得為一對曰性無不在故不説二詔又問曰説者皆言法性寬佛性愜寬愜既別非二而何弼又對曰在寬成寬在愜成愜若論性體非寬非愜詔又問曰既言成寬成愜何得非寬非愜若定是愜亦不能成寬對曰以非寬愜故能成寬愜所成雖異能成嘗一帝恱稱善乃引入經書庫賜地持經一部帛一百匹後四月八日帝集名僧於顯楊殿講説佛理弼與吏部尚書楊愔中書令邢邵祕書監魏𭣣等並侍法筵勑弼升師子座當衆敷演詔玄都僧達及僧道順並緇林之英問難鋒至往復數十畨莫有能屈帝曰此賢若生孔門則何如之興和二年春詔以鄴城舊宮為天下平寺世宗以來至武定末沙門知名者有惠猛惠辨惠深僧暹道銀僧獻道晞僧深惠光惠顒法宮道長並見重於當世自魏有天下至於禪讓佛經流通大集中國凡有四百一十五部合一千九百一十九卷正光已後天下多虞工役猶甚於是所在編民相與人道假慕沙門實避調役猥濫之極自中興之有佛法未之有也略而計之僧尼大衆二百餘萬矣其寺三萬有餘北齊文宣帝天保九年起大莊嚴寺武成帝河清二年五月詔以城南雙堂之菀建造大總持寺八月詔以三臺宮為大興聖寺後主天統二年太上皇帝詔以三臺施興聖寺以赦降囚徒五年正月詔以金鳳等三臺未入寺者施大興聖寺四月詔以并州尚書省為大基聖寺晉祠為大崇皇寺梁太祖開平元年五月廢雍州太清宮改西都太微宮亳州太清宮皆為觀諸州紫極宮皆為老君廟又泉州寺僧智宣自西域回進辟支佛骨及梵甲經律此僧自壯歲西遊及還已耄矣既遇新朝又傳佛教亦聖德之所感契六月改耀州報恩禪院為興國寺九月浙西奏道門威儀鄭章道士夏隱言焚修精志妙達希夷推諸輩流實有道業鄭章宜賜號貞一大師仍名玄章隱言賜紫衣二年六月雍州奏鏌鎁山僧法通道璘有道行各賜紫衣八月兩浙錢鏐奏改管內紫極宮為真聖觀三年福建節度使王審知奏捨錢造寺一所請賜寺額勑名大梁萬歲之寺仍許度僧四十九人四年正月賜湖南開元寺禪長老可復號惠光大師仍賜紫衣五年二月泌州置善護寺乾化元年六月詔修天宮佛寺又湖南奏潭州僧法思桂州僧歸真並乞賜紫衣可之二年夏文武官並詣佛寺為皇帝設齊命閣門使李元持香合賜之又中書奏為皇帝於長壽寺啓消災道場末帝龍德初祠部員外郎李樞上言請禁天下私度僧尼及不許妄求師號紫衣如願出家受戒者皆須赴闕比試藝術施行願歸俗者一聽自便詔曰兩都左右街賜紫衣及師號僧委功德使具名奏聞今後有闕方得奏薦仍須道行精至夏臘高深方得補填每遇明聖節兩街各許官壇度七人諸道如要度僧亦仰就京官壇仍令祠部給牒今後只兩街置僧録諸道僧正並廢
