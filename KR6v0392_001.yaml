body:
  text: 巡按福建監察御史臣李嗣京訂正分守建南道左布政使臣胡維霖𭆤閲知建陽縣事臣黃國琦較釋帝王部五十一崇釋氏昔漢明帝兆夢於金人楚王英為蒲塞桑門之饌繇是竺乾之教被於中夏其所述之旨所謂三歸五戒十善業四無量心四無色定以極人天之果四諦十二因緣六波羅蜜以辨三乘之位經律論以紀三藏之名數至于覺一切種智證無生法忍此所以登圓寂而成佛道也歷代帝王或崇奉其事營建塔廟增嚴像設翻譯梵文廣度淨衆蓋以茂植德本樹立衆善為民祈福驅之仁壽斯亦大易神道設教之旨歟漢武帝元狩中遣嫖姚將軍霍去病討胸奴至睪蘭過居延昆耶主將其衆五萬來降獲其金人帝以為天神列於甘泉宮金人率長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元壽元年博士弟子秦景憲受大月氐王使伊存口授浮屠經中土聞之未之信了浮屠正號曰佛陀其聲相近皆西方言華言譯之則謂淨覺後漢明帝夜夢金人頂有日光飛行殿庭乃訪群臣傅毅始以佛對帝遣郎中蔡愔及博士弟子等使於天竺寫浮屠遺範愔仍與沙門攝摩騰竺法蘭東還雒陽中國有沙門及跪拜之法自此始也愔又得佛經四十二章及釋迦立像帝令畫工圖佛像置清凉臺及顯節陵上經緘於蘭臺石室愔之還也以白馬負經而至漢因立白馬寺於雒陽雍關西摩騰竺法蘭咸卒於此寺章帝時楚王英喜為浮屠齊戒遣郎中令奉黃縑白紈三十匹詣相國以贖愆詔報曰楚王尚浮屠之仁祠潔齊三月與神為誓何嫌何疑當有悔吝其還贈以助伊蒲塞桑門之盛饌因以書示諸國伊蒲塞循優波塞桑門沙門也桓帝設華蓋以祠浮圖魏明帝時欲壞宮西佛圖外國沙門乃金盤盛水置於殿前以佛舍利投之於水仍有五色光起於是帝歎曰自非靈異安得爾乎遂徒于道為作周閭百間佛圖故處鑿為濛汜池種芙蓉於中晉明帝好佛手畫形像經歷寇難而堂存宜城王為之頌孝武太元六年正月帝初奉佛法立精舍于殿內引諸沙門以居之後魏道武帝初平中山經略燕趙所經郡國佛寺見諸沙門道士皆致情敬禁軍旅無有所犯帝好黃老頗覽佛經但天下初定戎車屢動庶事草創未建圖宇招延僧衆然時時訪求先是有沙門僧朗與其徒隱於泰山之崑峏谷帝遣使致書以繪素旃罽銀鉢為禮號曰朗公谷初神元與魏晉通聘文帝久在雒陽昭成文至襄國乃備究南夏佛法之事臣欽若等日自神元至昭成皆追冊帝號天興元年詔日夫佛法之興其來遠矣濟益之功無分存歿神蹤遺軌信可依憑其勑有司於京城建飾容範修整宮室令信向之徒有所居止是歲始作五級佛圖耆闍崛山及須彌山殿加以繢飾別搆講堂禪室及沙門座莫不嚴具焉明元帝好黃老及崇佛法京邑四方建立圖像仍令沙門敷導民俗初黃始中趙郡有沙門法果戒行精至開演法籍道武聞其名詔以禮徵赴京師後以為道人統攝僧徒每與之言多所愜允供施甚厚至是彌加崇敬永興中前後授以輔國宜城子忠信侯安成公之號皆固辭帝嘗親幸其居以門小狹不容輿輦更廣大之年八十餘卒帝三臨其喪追贈老壽將軍趙胡靈公先是法果每言道武明元好道即是當今如來沙門宜應𥁞禮遂嘗致拜謂人日能弘道者人主也我非拜天子乃是禮佛耳法果四十始為沙門有子曰猛詔令襲果所加爵帝後幸廣宗有沙門曇證年且百歲邀見於路奉致果物帝敬其年老志力不衰亦加以老壽將軍之號太武帝遵道武明元之業每引高德沙門與共談論於四月八日輿諸佛像行於廣衢帝親御門樓臨觀散花以致禮敬先是沮渠蒙遜在凉州亦好佛法有罽賔沙門曇摩讖習諸經論於姑與沙門智高等譯涅槃諸經十餘部又曉術數禁呪歷言他國安危多所中驗蒙遜每以國事咨之神䴥中帝命蒙遜送讖詣京師惜而不遣既而懼魏威責遂使人殺讖讖死之日謂門徒日今時將有客來可早食以待之食訖而走使至時人謂之知命帝初平赫連昌得沙門惠始姓張家本清河聞鳩摩羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聽講夕則還處靜坐三輔有識多宗之宋高祖為晉太尉滅姚泓留子義真于長安及其去也赫連屈丐追敗之道俗少長咸見坑戮惠始身被白刃而體不傷衆大怪異言於屈丐屈丐大怒召惠始於前以所持寶劒擊之又不能害乃懼而謝罪昌平惠始到京都多所訓導時人莫測其迹帝甚重之每加禮敬始自習禪至於沒世稱五十餘未嘗𥨊臥或時跣行雖履泥塵而不污足色愈鮮白世號之白腳終於入角寺文成帝興安元年詔日夫為帝王者必祗奉明靈顯彰二道其能惠著生民濟益群品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族况釋迦如來功濟大千惠流塵境尋生死者歎其達觀覽文義者貴其沙門𦔳王政之禁律益仁智之善性排斥群邪開演正覺故前代以來莫不崇尚亦我國家嘗所尊事也世祖太武皇帝開廣邊荒德澤遐及沙門道士善行純誠惠始之倫無遠不至風義相感往往如林夫山海之深怪物多有姦淫之徒德容假託講寺之中致有兒黨是以先朝因其瑕釁戮其有罪有司失旨一切斷禁景穆皇帝每為慨然值軍國多事未遑修復朕承洪緒君臨萬邦思述先志以隆斯道今制諸州郡縣於衆居之所各聽建佛圖一區任其財用不制會限其好樂道法欲為沙門不問長幼出於良家性行素篤無諸嫵穢鄉里所明者聽其出家率大州五十人小州五十人其郡遠臺者十人各當局分皆足以化惡就善播揚道教也初太武詔誅長安沙門焚破佛像勑留臺下四方令一依長安行事至是復之所毀圖寺仍還修復佛像經論皆得顯傳京師沙門師賢本罽賔國王種人少入道東遊凉城凉平赴京罷佛法時師賢假為醫術還俗而守道不改於修復日即反沙門其同輩伍人帝皆親為下髮師賢仍為道人統是年詔有司為石像令如帝身既成頭上足下各有黑石𡨋同帝體上下黑子論者以為純誠所感興光元年秋勑有司於五級大寺內為太祖已下五帝鑄釋迦立像五各長一丈六尺都用赤金二十五萬斤太安初有師子國胡沙門邪奢遣多浮陀難提等五人奉佛像三到京都皆云備歷西域諸國見佛影迹及肉髻外國諸王相求咸遣工匠摹寫其容莫能及難提所造者去十餘步視之炳然轉近轉微又沙勒胡沙門赴京師致佛鉢并畫像迹和平初以僧曇曜為沙門統初曇曜以復佛法之明年自中山被命赴京值帝出見於路御馬前馬前銜曜衣時以為馬識善人帝後奉以師禮曇曜白帝以京城西武州塞鑿山石璧開窟五所鐫建佛像各一高者七十尺次六十尺雕飾奇偉冠於一世曇曜奉平齊戶及諸民有能歲輪穀六十斛入僧曹者即為僧祗戶粟至於儉歲賑給饑民又請民犯重罪及官奴以為佛圖戶以供諸寺掃灑歲兼營田輸粟帝並許之於是僧祗戶粟及寺戶遍於州鎮矣曇曜又與天竺沙門嘗那邪舍等譯出新經十四部又有沙門道進僧超法存等並有名於時演唱諸典獻文天安中起永寧寺搆七級佛圖高三百餘尺基架博敞為天下第一又於天宮寺造釋迦立像高四十三尺用赤金十萬斤皇興中又搆三級石佛圖榱棟楮楹上下重結大小皆石頭高十丈鎮固巧密為京華壯麗其後傳位於太子移御北苑崇光宮覽習玄籍建鹿野佛圖於苑中之西山去崇光右十里巖房禪舍禪僧居其中孝文承明元年八月詔起建明寺太和元年二月幸永寧寺設齊赦死罪囚三月又幸永寧寺設會行道聽講命中祕三省與僧徒討論佛義施僧衣服寶器有差又於方山道武營壘之處建恩遠寺自興光後至北京城內寺新舊且百所僧尼二千餘人四方諸寺六千四百七十八僧尼七萬七千二百五十八人四年正月丁巳罷畜鷹鷂之所以其地為報德佛寺初文明皇后生獻文帝帝立尊為皇太后至是詔罷鷹師及諸鷙傷生之類宜放之山林以其地為太后立寺十五年八月戊戌移道壇於桑乾之陰改日崇虛寺十六年詔四月八日七月十五日聽大州度一百人為僧尼中州五十人下州二十人以為嘗准著於令十七年詔立僧制四十七條十九年四月帝幸徐州白塔寺顧謂諸王及侍臣曰此寺近有名僧嵩法師授成實論于羅什在此流通後授淵法師淵法師授登紀二法師朕每玩成實論可釋人染情故至此寺焉時沙門道登雅有義業為帝眷賞嘗時講論𭦌於禁內與帝夜談同見一鬼及卒帝甚悼惜之詔施布一千匹又設一切僧齊并命京城七日行道又詔曰朕道登法師奄至徂背痛怛摧慟不能已已比藥治隕喪未容即赴便準師義哭諸門外祭奠之又有西域沙門各跋跎素有道業深為帝所敬信詔於少室山陰立少林寺而居之公給衣供二十一年五月詔曰羅什法師可謂神出五才志入四行者也今嘗住寺猶有遺地欽悅修蹤情深遐邇可於舊堂所為建三級浮圖又見逼昏虐為道殄軀既暫同俗禮應有子孫可推訪以聞當加序接先是立建福曹又改為昭玄備有官屬以斷僧務時沙門道順會覺僧意惠紀僧範道辨惠度智誕僧顯僧義僧利並以義行知重宣武帝景明元年詔大長秋卿白整準大京靈巖寺石窟於雒南伊闕山為高祖文昭皇太后營石窟二所初建之始窟頂去地三百一十尺至正始二年終始斬山二十三丈大長秋卿王質謂斬山太高費功難就奏求下移就平地去一百尺南北一百四十尺永平中中尹劉勝奏為帝復造石窟一凡為三所從景明元年至正始四年六月已前用功八十萬二千三百六十六永平元年秋詔曰緇素既殊法律亦異故道教彰於玄顯禁勸各有所宜自今已後衆僧犯殺人已上罪者仍依俗斷餘犯付昭玄以內律僧制治之二年冬沙門統惠深上言僧尼浩曠清濁混流不遵禁典精粗莫別輒與經律法師群議上制諸州鎮郡維那上座寺主各令戒律自修咸依內禁若不解經律者退其本次又出家之人不應非法積八不淨物然經律所制通塞有方依律車牛淨人不淨之物不得為己私畜惟有老病年六十已上者限聽一乘又比來僧尼或因三寶出貸私財自此不得更爾又出家捨著本無凶儀不應廢道從俗其父母三師遠聞凶問聽哭三日若在見前限以七日或有不安寺舍遊止民間亂道生過皆繇此等若有犯者脫服還民其有造寺者限僧五十以上啓聞聼造若有輒營置者處以違勑之罪其寺僧衆擯出外州僧尼之法不得為俗人所使若有犯者還配本屬其外國僧尼來歸化者求精舍簡有德行合三藏者聼住若無德行遣還本國若其不去依此僧制治罪詔從之是年十一月帝於試乾殿為諸僧朝臣講維摩詰經二年冬迎弘農荊山造珉玉丈六像置於雒濱之報德寺帝躬覩致敬四年夏詔曰僧祗之粟本朝濟施儉年出貸豐則收入山林僧尼隨以給施民有窘弊亦即賑之但主司利規取贏息及其徵責不計水旱或償利過本或翻改券契侵蠹貧下莫知紀極細民嗟毒歲月滋甚非所以矜此窮乏崇尚慈極之本意也自今已後不得專委維那都尉可令刺史共加監括尚書簡諸有僧祗穀之州別列其元數出入贏息賑給多少並貸償歲月見存未收上臺録記若收利過本及翻改初券依律免之勿復徵責或有私債孺施償僧即以丐民不聽收簡後有出貸先𥁞貧窮徵責之科一准舊格富有之家不聽輒貸脫仍濫依法治罪時尚書令高肇奏言謹案故沙門統曇曜昔於承明元年奏度凉州軍戶趙苟子等二百家為僧祗戶立課積粟擬濟饑年不限道俗皆以拯施又依內律僧祗戶不得別屬一寺而都維那僧暹僧頻等進違成旨退乖內法肆意任情奏求逼召致使呼嗟之怨盈於行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之志深失陛下歸依之心遂令此等行號巷哭呌訴無所至乃白羽貫耳列訟官闕悠悠之人尚為哀痛况慈悲之士而可安之計聽苟等還鄉課輸儉乏之年周給貧寡若有不虞以擬捍邊其暹等違旨背律謬奏之愆請付昭玄依僧律推處詔曰暹等特可原之餘如奏帝篤好佛理每年嘗於禁中親講經論廣集名僧標明異旨沙門以修録為內起居焉帝既崇之下彌企尚至延昌中天下州郡僧尼寺積有一萬三千四百三十七所徒侶逾衆孝明熙平元年詔遣沙門惠生使西域採諸經律及還京師所得經論一百七十部行於世時帝於城內大社西起永寧寺靈太后親率百寮表基立剎佛圖九層高四十餘丈其諸費用不可勝紀景明寺佛圖亦其亞也至於官私寺塔其數甚衆神龜元年冬司空尚書令任城王澄奏曰仰惟高祖定鼎嵩瀍卜世悠逹慮括始終制洽天人造物開符垂之萬葉故都城制云城內惟擬一永寧寺郭內唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢踰矩逮景明之初微有犯禁故世宗仰修先志爰發明旨城內不得造立浮圖僧尼舍亦欲絶其希覬文武二帝豈不愛尚佛法蓋以道俗殊歸理無相亂故也但俗眩虛聲僧貪厚潤雖有顯禁猶自營至正始三年沙門統惠深有違景明之禁便云營就之寺不忍移毀求自今已後更不聽立先旨寬容抑典從請前班之詔仍卷不行後來私謁彌以奔競永平二年深等復立條制啓云自今已後欲造寺者限僧五十已上聞輒聽造若有輒營置者依俗違勑之罪其寺僧衆擯出外州爾來十年私營愈盛罪擯之事寂爾無聞豈非朝格雖明恃福共毀僧制徒立顧利莫從者也不俗不道務為法人而無厭其可極乎夫學迹冲妙非浮識所辨玄門曠寂豈短辭能究然淨居塵外道家所先功緣冥深匪尚𦰗遁苟能誠信童子聚石可邁於道場純頭陀儉設足薦於雙樹何必縱其盜𥨱資營寺覩此乃民之多幸非國之福也然比日私造動盈百數或剩請公地輒樹私福或啓得造寺限外廣制如此欺罔非可稍計臣以才劣誠忝公務奉遵成規裁量是總所以披尋舊旨研究圖格輒遣府司馬陸昶屬崔孝芬都城之中及郭邑之內簡括寺舍數剩五百空地表剎未立塔宇不在其數民不畏法乃至於斯自遷都已來年踰二紀寺奪民居三分且一高祖立制非徒欲使緇素殊途抑亦防微深慮世宗述之亦不可錮禁營福當在先塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連簷接響像塔纏於腥臊性靈沒於嗜欲真僞混居往來紛雜有司因習而莫非僧曹對制而不問其餘污染真行塵穢練僧薰猶同器不亦甚歟往在北伐有法秀之謀近日冀州遭大乘之變皆初假神教以惑衆心終設姦誑用逞私悖太和之制因法秀而壯遠景明之禁慮太乘之將亂始知祖宗獻聖防遏慮深履霜堅冰不可不慎昔如來闡教多依山林今此僧徒戀著城邑豈湫隘是經行所宜浮喧必栖禪之宅當繇利引其心莫能自止處者既失其貞造者或其福乃釋氏之糟糠法中之社鼠內戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有栖心真趣道業清遠者或外假法服內懷悖德者如此之徒宜辨涇渭若雷同一貫何以勸善然覩法贊善凡人所知隨俗避嫌物情同趣臣獨何為孤議獨發誠以國典一廢追理至難法網暫失條綱將亂是以陳愚見兩願其益臣聞設令在於必行立罰貴能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而為犯不息者豈不以假福託善幸罪不加人殉其私吏難其劾前制無追往之辜後旨開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁紏其來違懲其往失脫不峻簡方垂容惜恐今旨雖明復如往日又旨令所斷標榜禮拜之處悉聽不禁愚以為樹榜無嘗禮處難驗欲令有造立榜證公須營之辭旨以言嘗禮如此則徒有禁名實通造路且臨御已後斷詔四行而私造之徒不懼制而止豈是百官有司怠於奉法將繇網漏禁寬容託有他故耳如臣愚量都城之中雖有標榜營造之功事可改立者請依先制在於郭外任擇所便其地若得券證分明者聽其孺施若官地盜作買即令還官若靈像既成不可移徹請依令勑如舊不禁今悉坊內行止不聽毀坊開門以妨里內通巷若被旨者不在斷限郭內准此商量其廟像嚴立而逼近屠沽者請斷旁屠殺以潔靈居雖有僧數而事在可移者令就間敞以避溢漏如今年正月勑後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令克限其地賣還一如上式自今外州若欲造寺僧滿五十以上先令本州表列昭玄量審奏聽乃立若有違犯悉依前科州郡以下容而不禁罪同違旨庶仰遵先皇不朽之業俯奉令旨慈悲之令則繩墨可全聖道不墜矣奏可未幾天下喪亂加以河陰之酷朝士死者其家多捨居宅以施僧尼京邑第舍略為寺矣前日禁令不復行焉後周太祖為魏丞相雅好談論并簡名僧深識玄宗者一百人於第內講說又令行臺學士薛慎等十二人兼學佛義使內外俱通繇是四方競為大乘學丞相府記室參軍盧光性崇佛道至誠信敬嘗從帝狩於檀臺山時獵圍既合帝遙指山上謂群公等有所見不咸日無見光獨日見一桑門帝曰是也即解圍而還令光於桑門立處造浮圖掘臺一丈得瓦鉢錫杖各一帝稱歎因立寺焉武帝天和四年二月帝御大德殿集百寮道士沙門等討論釋老義宣帝大象元年初復佛像及天尊像初武帝至德三年斷佛道二教像悉毀罷至是復之帝與二像俱南面而坐大陳雜戲令京城士民縱觀靜帝以大象二年即位復行佛道二教舊沙門道士精誠自守者簡令入道隋文帝開皇十二年令陳散騎嘗侍徐孝克於尚書都堂講金剛般若經二十四年詔沙門道士壞佛像天尊百姓壞嶽瀆神像皆以惡逆論帝年齡晚暮尤崇尚佛道故也仁壽元年六月頒舍利於諸州唐太宗貞觀三年十二月癸丑詔曰至人虛已忘彼我於胸懷三教慈心均異同於平等是知上聖惻隱無隔萬方大悲弘濟義猶一子有隋失道九服沸騰朕親總元戎致茲明罰誓牧登陑𭦌無寧歲老弱被其桀犬愚惑嬰此湯羅𠼫鬚義憤捐軀抗節各殉所奉咸有可嘉日往月來逝川斯逹雖復項籍放命封樹紀於丘墳紀信捐生丹書著於固史猶恐九泉之下尚淪鼎鑊八難之間永纏氷炭愀然疚懷用忘興𥨊思所以樹立福田濟其營魄可於建義已來交兵之處為義士凶徒殞身戎陳者立寺剎焉乃詔虞世南李百藥褚亮顏師古岑文本許敬宗朱子奢等為之碑銘以紀功業時沙門玄奘於中天竺國將梵本經論六百餘部而歸太宗竒之召高業沙門與之翻譯出三藏聖教太宗為其論序皇太子重闡斯美乃著述聖記以廣其義十六年五月御製懺文於弘福寺曰聖哲之所尚者孝也仁人之所愛者親也朕幼荷鞠育之恩長蒙撫養之訓蓼莪之念何日忘之罔極之情昊天匪報昔子路歎千鐘之無養虞丘嗟二親之不待方寸亂矣信可悲夫朕每痛一月之中再罹艱疚興言永慕哀切深衷欲報靡因唯資𡨋𦔳敬以絹二百匹奉於大道儻至誠有感異消過去之愆為善有因庶獲後緣之慶高宗永徽二年八月廢玉華殿以為佛寺顯慶元年四月戊申御安福門樓觀慈恩寺僧玄奘等迎御製書慈恩寺碑文向寺諸寺皆造幡蓋飾以金寶窮極瓌麗太嘗及京城音樂車數百兩僧尼執幡兩行導從士女觀者填噎街衢自魏晉以來崇事釋教未嘗有如此盛者也乾封元年正月戊辰朔有事於泰山詔兗州置觀寺各三所其觀以紫雲仙月萬歲為稱其寺以封巒非煙重輪為名各度七人天下諸州別置一觀一寺各度七人中宗神龍元年二月制天下諸州各置寺觀一所咸以大唐中興為名九月制曰如聞天下諸觀皆畫化胡之變諸寺亦畫老君之形一種尊容兩俱不可限制到後十日並除却若有故留者即科違勑罪其化胡經先有明勑禁斷如聞在外仍頗流行自今諸部化胡經事及餘說化胡事處並冝除削三年七月丁酉以所造長樂坡大像工役稍廣百姓多怨嗟制罷之玄宗開元二十年都城僧等奏曰伏請以每歲八月于衛國天宮等寺轉經行道至九月罷為陛下修福在京於雲化興善等寺歲以為嘗許之二十三年九月親注金剛經及修義訣中書令張九齡等上言臣等伏見御注前件經及義訣佛法宗旨撮在此經人間傳習多所未悟陛下曲垂聖意敷演微言幽闡妙鍵豁然洞達雖臣等愚昧本自難曉伏覽𥈠旨亦既發明是知日月既出天下普照誠在此也陛下至德法天平分儒道已廣度其僧又不違其願三教並列萬姓知歸伏望降出御文內外傳授帝手詔報曰僧徒固請欲以興教心有所得輒復疏之今請頒行仍慮未愜簡較釋門威儀僧思有奏曰自像教西流貝文東譯學傳師口凡今則多注訣聖情前古未有臣請具幡花奉迎於敬愛寺設齊慶賀其御注經伏乞示天下宜付史官許之二十六年正月丁酉制曰道釋二門皆為聖教義歸弘濟理在尊崇其天下觀寺大小各度一十七人簡擇灼然有經業戒行為鄉閭所推仍先取年高者二十七年二月制天下觀寺每于齊日宜轉讀經典懲惡勸善以闡文教天寶四載九月詔曰波斯經教出自大秦傳習而來久行中國爰初建寺因以為名將欲示人必修其本其兩京波斯寺冝改為大秦寺天下諸府郡者亦冝准此十載六月帝以先帝忌日命女工繡釋迦牟尼佛像親題繡額稽首祈福
