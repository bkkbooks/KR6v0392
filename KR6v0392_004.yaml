body:
  text: 巡按福建監察御史臣李嗣京訂正分守建南道左布政使臣胡維霖𭆤閲知建陽縣事臣黃國琦較釋總録部七十一崇釋教昔班固紀身毒之國楚英為桑門之饌繇是金𠎣之教被於中夏其所述者六趣往返四生輪轉以極於俗諦三乘十地等妙二覺以究於聖果敘黑白之業以明乎報應研空有之理以顯乎真宗蓋出世之玄談非嘗情之能軌度也兩晉之後教典彌盛當時名士奉之甚衆精意厥修以徼福為念或著書演析以駕説為務乃至稟持戒律動靜靡偷感致靈異考終厥命者亦比比有焉後漢裴楷桓帝時言佛陀黃老道以諫欲令好生惡殺少嗜欲去奢泰尚無為也晉郗超侍中愔之子少卓犖不羈有曠世之度交遊士林每存勝善談論義理精微愔事天師道高超奉佛超無子以從弟儉之子嗣名僧施字惠脫超官至臨海太守宣威將軍何準字幼道克弟也高尚寡欲充居宰輔之重權傾一時而準散帶𢖍門不及人事唯誦佛經修營塔廟而已徵拜散騎郎不起周嵩為王敦從事中郎為敦所害嵩精於事佛臨刑猶於市誦經云前秦徐義為符堅右丞相堅敗義為慕容永所獲械埋其足將殺之中若有人導之者遂奔楊佺期佺期以為雒陽令宋范泰為侍中左光祿大夫國子祭酒領江夏王師暮年事佛甚精於宅西立抵洹精舍孟顗為會稽太守事佛精懇而為謝靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言蕭惠開為中庶子丁父憂居喪有孝性家素奉佛凡為父起四寺南岸南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩蓋鮮而兄弟甚多若使全關一人則在我所讓若使人人等分又事可悲耻寺衆既立自宜悉供僧衆繇此國秩不復入家周續之字道祖居豫章初以太學博士徵不起間居讀老易入廬山事沙門釋慧遠沈道虔有高尚之節纍世事佛推父祖舊宅為寺至四月八日每請像請像之日輒舉家感動焉道虔年老菜食嘗無經日之資而琴書為樂孜孜不倦雷次宗有高節不交世務嘗與子姪書以言所守曰人生修短咸有定分定分之外不可智力求但當於所稟之中順而勿牽爾吾少嬰羸疾念自鍾養為性好間志栖物表故年雖童稚已懷遠迹暨以弱冠遂託業廬山逮事釋和尚不時師友淵源稟教於是洗氣神明玩心墳典勉志勤躬夜以繼日爰篤山林之好晤言之歡實足通理輔性成天亹亹之業樂而忘憂不知朝日之宴矣自遊道餐風二十餘載淵匠既傾良朋雕索續以舋逆違天備嘗荼𮑹疇昔誠願頓盡一朝心慮荒散情意衰故遠與汝曹歸耕壟畔山居谷飲人事久絶日月不處急復十年犬馬之齒已踰知命淹茲將迫前途幾何實遠相向于五嶽之之舉近謝居室瑣瑣之勤及今耄未至昏衰不及頓尚可厲志於所期縱心於所託栖誠來生之津慧專氣暮年之攝養玩嵗月於良辰偷餘樂於將除在心所期盡於斯矣汝等年各成長冠娶已畢修性𢖍泌吾復何憂但願守全所志以保令終耳自今以往家事大小一勿見關子平之言可以為法南齊周顒字彥倫初事宋為輔國府𭆞軍明帝為毒之事顒不敢顯諫輒誦經中因緣罪福事帝亦為之小止顒長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉麈尾來四十餘載餘義頗見宗録唯此𡍼白黑無一人得者為之發病非意此音猥來入耳其論見重如此顒於鍾山西立隱舍休沐則歸之時何㣧亦精言佛法既斷食生猶欲食肉白魚鱔脯糖蟹以為非見生物疑食蚶蠣使學生議之學生鍾岏曰鱔之就脯驟為屈伸蟹之將糖躁擾彌甚人仁用意深懷如怛至於車螯蚶蠣睂目內闕慙渾沌之奇獷慤外緘非金人之慎不悴不榮曾草木之不若無馨無臭與瓦礫其何算故宜長充庖厨永為口實竟陵王子良見岏議大怒㣧兄點亦遁節清信顒與書勸令菜食曰文人之所以未極遐踲或在不能全菜耶脫灑離析之計鼎俎網罟之興載之簡策其來實遠誰敢干議觀聖人之設膳羞仍復為之品節蓋以茹毛飲血與生民共始縱而勿裁將無涯畔善為士者豈不以恕己為懷是以各靜封疆罔相陵軼况乃變之大者莫過死生生之所重無踰性命性命之於彼極切滋味之在我何賖而終身朝脯資之以味彼就冤殘莫能自剖我業久長吁哉可畏且區區微卯脆薄易矜瞻彼弱麑顧步宜愍觀其飲啄飛行使人憐悼况可甘心朴加復恣忍吞嚼至乃野牧成群閉豢重圈量肉揣毛以俟支剝如土委地僉謂嘗理可為愴息事豈一𡍼若去三世理誣則幸矣良快如使此道果然而受刑未息則一往一來一生一死斯為嘗事雜報如家人天如客遇客日鮮在家日多吾儕信業未足長免則傷心之慘行亦自及夫人於血氣之類雖無身踐至於晨鳬夜鯉不能不取備屠門財帛方經盜手猶為廉士所棄生性任啓鸞刀寧復慈心所忍騶虞雖飢非自死之革不食聞其風豈不使人多愧衆生之稟此形質以畜𦠄骨皆繇其積壅癡迷沉流莫返報受穢質歷若彌長此甘與肥皆無明之報聚也何至復引此滋腴自汙腸胃文人得此有素聊復寸言發起耳㣧末年遂絶血味李安民為吳興太守郡有項羽神護廳事太守不得上太守到郡必須祀以軛下牛安民奉佛法不與神牛著屢上廳事上八關齋戒俄而牛死葬廟側呼為李公牛冢及安民卒世以神為崇張融字思光為司徒右長史凡涉百家長於佛理著三宗論王奐為雍州刺史武帝謂王晏曰奐於釋氏實自專至其在鎮或以此妨務卿相見言自及之勿道吾意也劉虬精信釋氏衣粗布禮佛長齋注法華經自講佛義以江陵西沙州去人遠乃徙居之明帝建武末年詔徵國子博士不就其冬虬病正晝有白雲徘徊簷戶之內又有香氣及磬聲乃卒年八十五王繢奐從弟也為太子中庶子世祖出射雉繢信佛法稱疾不從駕何幼嶼殊好佛法剪落長齋持行精苦卒年八十餘王斌初為道人博涉經籍雅有才辨善屬文能唱導而修容儀嘗弊衣於瓦棺寺聰雲法師講成實語無復坐處唯僧正慧超尚空席斌直坐其側慧超不能平乃罵之曰那得此道人祿䔩似隊父唐突人因命驅之斌笑曰既有敘勳僧正何為無隊父道人不為動而樞機問難辭理清舉四坐皆屬目后還俗以詩酒自樂人莫能名之梁何㣧少入鍾山定林寺聽內典其業皆通後至吳居虎丘西寺講經論學僧復隨之東竟守宰經途者莫不畢至㣧嘗禁殺有虞人逐鹿鹿徑來趨㣧伏而不動年八十六卒注百法論十二門論各一卷樂法才為江夏太守因被代表便道還鄉至家割宅為寺棲心物表謝舉為尚書令侍中少博涉多通㔫長玄理及釋氏義為晉陵郡時嘗與義僧講經論徵士何㣧自虎丘山出赴之其盛如此舉宅內山齋捨以為寺泉石之美殆若自然臨川始與諸王嘗所遊踐舉注淨名經嘗自講説陸杲為金紫光祿大夫素信佛法持戒甚精著法門傳三十卷裴子野河東聞喜人末年深信釋氏持其教戒終身飯麥食蔬終步兵較尉孔雲篤信佛理遍持經戒官至嶽陽王府咨議東陽州別駕江革為太尉臨川王長史時高祖盛於佛教朝賢多啓求受戒革精信因果而高宗未知謂革不奉佛教乃賜革覺意詩五百字云唯當勤精進自強行勝修豈可作底突如彼必死囚以此告江革并及諸貴遊又手敕云世間果報不可不信豈得底突如對元延明邪革因啓乞受菩薩戒何敬容為尚書令中大同初高祖幸同太寺講金字三惠經敬容請預聽勑許之何氏自晉司空充守司空尚書世奉佛法並建立塔寺至敬容又捨宅東為伽藍趨世者因助財造搆敬容並不拒故此寺堂宇較飾頗為宏麗時輕薄者因呼為衆造寺焉及敬容免職出宅止有嘗用器物乃囊衣而已竟無餘財貨亦以此稱之到溉為左民尚書家門雍睦兄弟相愛初與弟洽嘗共居一齊洽卒便捨為寺因斷腥膻終身蔬食別營小室高祖每月二置淨饌蕭幾為尚書左丞末年專奉釋教劉協字彥和早孤篤志好學家貧不婚娶依沙門僧祐與之居處積十餘年遂博通經論因區別部類録而序之今定林藏經協所定也後為步兵較尉通事舍人協為文長於佛理京師寺塔及名僧碑志必請協製文有敕與慧鎮沙門於定林寺撰經證功畢遂啓求出家先燔鬚髮以自誓勑許之乃於寺變服名慧地未期而卒劉香為尚書左丞奉釋氏經教嘗行慈忍任孝恭為司文侍郎兼通事舍人少從蕭寺雲法師讀經論明佛理至是蔬食持戒信受甚焉陶弘景初為諸王侍讀奉朝請後棄官居句容曾夢佛授其菩提記名為勝力菩薩乃請鄮縣阿育王塔自誓守五大戒劉慧斐初為安西成王法曹行𭆞軍明釋典工篆𨽾在山手寫佛經二千餘卷晝夜行道孜孜不倦遠近欽慕之范文琰吳郡錢塘人好學博通經史兼精佛義臨川王辟不就劉訏平原人善立言尤精釋典與族兄劉歊聽講於鍾山諸寺因共卜築宋熙寺東澗有終焉之志刺史張稷辟主簿不就張孝秀為建安王別駕頃之遂去職歸山居于東林寺專精釋典庾詵新野人性夷曠愛林泉高祖以平西記室徵不起晚年㔫遵釋教宅內立道場環繞禮懺六時不輟誦法華經每月一百遍後夜中忽見一道人日稱願公容止甚異呼詵為上行先生授香而去中大通四年因晝寢忽驚覺曰願公復來不可久住顏色不變言終而卒時年七十八舉室咸聞空中唱上行先生已生彌陀淨域矣劉歊隱居求志遨遊山澤幼時嘗病坐室空有一老公至門謂歊曰心力勇猛能精心性但不得久滯一方耳囚彈指而去歊既長精心學佛有道人釋寶志者時人莫測也遇歊於興皇寺驚起曰隱居學道清淨登佛如此三説陳王固清虛寡欲居喪以孝聞又崇信佛法及丁所生母憂遂終身蔬食夜則坐禪晝誦佛經兼習成實論義嘗聘于西魏因宴享之際請停殺一羊羊於固前跪拜又宴昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲位至太嘗卿周弘正為尚書右僕射弘正持善立言兼名釋典雖碩學名僧莫不請質疑滯初藏法師於開善寺講説門徒數百弘正年少未知名著紅綿絞髻踞門而聽衆人蔑之弗譴也既而乘間進雖舉坐盡傾法師疑非世人陸慶少好學遍通五經仕梁為婁令值梁季喪亂乃覃心釋典經論靡不該究鄱陽晉安王俱以記室徵並不就乃築室屏居以禪誦為事繇是傳經受業者蓋鮮矣姚察為尚書領著作察幼年嘗就鍾山明慶寺尚禪師受菩薩戒及在官祿俸皆捨寺起造并追為禪師樹碑文甚遵麗又遇見梁國子祭酒蕭子雲書此寺禪齋詩覽之愴然乃用蕭韻述懷為詠詞又哀切益以此稱之察初願讀一藏經便已究竟將終曾無痛但西向正坐念云一切空寂卒後身體柔軟顏色如嘗徐凌為太子太傅凌少而崇信釋教經論多所精解後主在東宮令凌講大品經義名僧自遠雲集每講筵商較四座莫能與抗徐孝克凌弟也初為太學博士東遊居于錢塘之住義里與諸僧討論釋典遂通三論每日二時講早講佛經晚講禮傳道俗受業者數百人文帝天嘉中除剡令非其好也尋復去職高宗太建四年徵為祕書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經高宗甚高其操行後為都官尚書孝克性清素而好施惠故不免飢寒後主敕以石頭津稅給之孝克悉用設齋寫經隨盡後主禎明中為散騎嘗侍陳亡入隋為國子祭酒以疾卒時年七十三臨終正坐念佛室內有非嘗異香氣鄰里皆驚異之馬樞扶風郡人善佛經及周易老子義撰道覺論二十卷行於世梁邵陵王綸為南徐州刺史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆與馬學士論義必使屈服不得空立客主於是數家學者各起問端樞乃依次剖判開其宗旨然後枝分派別轉變無窮論者拱默聽受而已論甚嘉之天嘉元年以度支尚書徵不起孫㻛為郢州刺史處已率易不以名位驕物時興皇慧朗法師該通釋典㻛每造講筵時有抗論法侶莫不傾心傅縡為右衛將軍兼中書通事舍人篤信佛教從興皇慧朗法師受三論盡通其學時有大心皓法師著無諍論以該之縡乃為明道論用釋其難其略曰無此下論多誤諍論言比鬥有弘三論者雷同訶詆恣言罪狀歷毀諸佛非斥衆學論中道而執偏心語忘懷而竟獨勝方學數論更為讐敵讐敵既搆爭鬬大生以此之心而成罪業罪業不止豈不重增生死大若聚集答曰三論之興為日久矣龍樹創其源除內學之偏見提婆揚其旨蕩外道之邪執欲使大化流而不壅玄風闡而無墜其言曠其意遂其道博其流深斯固龍象之騰驤鯤鵬之摶運蹇乘決羽豈能觖望其間哉頃代澆薄時無曠土苟習小學以化蒙心漸染成俗遂迷正路唯競穿鑿各肆營造枝葉徒繁本源日翳一師解釋復異一師更改舊宗各立新意同學之中取窹復別如是輾轉添糅倍多總而用之心無的凖擇而行之何者為正豈不渾沌傷竅嘉樹弊牙雖復人説非馬家握靈蛇以無當之危同畫地之餅矣其於失道不亦宜乎攝山之學則不如是守一遵本無改作之過約文申意杜臆斷之情言無預説理非宿搆覩緣爾乃應見敵然後動縱橫絡釋忽恍杳冥或瀰漫而不窮或逍散而無所煥乎其有文章蹤迹不可得深淵不可量即事而非遠凡相酬對隨理詳覆有何嫉詐干犯諸師諸師所説是為可毀為不可毀若可毀者為故衰若不可毀毀自不及法師何獨弊護不聽護乎且教有大小倘在聖誥大乘之文則指斥小道今弘大法寧得不言大乘之意邪斯則褒貶之事縱橫於學與奪之辭依經議論何得見佛説而信順在我語而忤逆無諍平等心如是邪且忿恚煩惱凡夫嘗性失理之徒率皆如此豈可以三修未愜六師懷恨而蘊涅槃妙法永不宣揚但兾共忿憤之心既極恬淡之窹自成爾人面不同其心亦異或有辭意相反或有心口相符豈得必謂他人説中道而心偏執已行無諍外不違而內平等讐敵鬬訟豈我事焉罪業聚集在鬬諍者所謂耳無諍論言攝山太師誘進化導則不如此即習行於無詐者也遵窹之德既往淳一之風已澆競勝之心呵毀之曲盛於此矣吾願息訟諍以通道讓勝以忘德何必撥亂異家生其恚怒者乎若以中道之心行於誠實亦能不諍若以偏著之心説於中論亦得有諍固知諍與不諍偏在一法答曰攝山太師實無諍矣但法師之所嘗未中其節彼靜守幽谷寂爾無為凡有訓勉莫不同心從容語默物無間然故其意雖深其言甚約今之敷暢地勢不然處生城之隅居聚落之內呼吸顧望之容唇吻縱橫之士奮鋒勵羽翼明目張膽披堅執鋭騁異家衒別解窺伺間隙較其長短與相酬對捔其輕重豈得默默無言唯唯應命必須掎托同異發摘疵瑕忘身而弘道忤俗而通教以此為病益知未達若令太師當此之地亦何必默已而為法師所貴邪法師又言吾願息諍以通道讓勝以忘德道德之事不止在諍與不諍讓與不讓也此語直是人間所重法師慕而言之竟未知勝若為可讓也若他人道高則自勝不勞讓矣他人道劣則雖讓而無益踈矣欲讓之心將非虛設中道之心無處不可誠實三論何事致乖但願息守株之解除膠柱之意是事皆中也來旨言諍與不諍偏在一法何為獨褒無諍邪詎非矛楯無諍論言邪正得失勝負是非必生於心矣非謂所説之法而有定相論勝劣也是異論是非以偏著為失信無是無非消彼得失以此論為勝妙者他論所不及此亦為失也何者凡心所破豈無心於能破則勝負之心不忘寧不存勝者乎斯則矜我為得棄他人之失即有取捨大生是非便增鬬諍答曰言心使心受言詮和合根塵鼓動風氣故成語也事必繇心實如來説至於心造偽以使口口行詐以應心外和而內險言隨而意逆求利養引聲名入道之人在家之士斯輩非一聖人所以曲陳教誡深致防杜説現在之殃咎敘將來之患害此文明著甚於日月猶有忘愛軀冒峻制陷湯炭甘虀粉必行而不顧也豈能悅無諍之詐而回首革音邪若弘道之人宣化之士心知勝也口言勝也心知劣也口言劣也固無所包藏亦無所忌憚但直心而行之耳他道雖劣聖人之教也己德雖優亦聖人之教也我勝則聖人勝他劣則聖人劣聖人之優劣蓋根緣所宜爾於彼於此何所厚薄哉雖復終日按劍極夜擊拆瞋目以爭得失作氣以求勝負在誰處乎有心之與無心徒欲分別虛空耳何意不許我論説而使我謙退此謂鶴鵬已翔於寥廓而虞者猶窺藪澤而求之嗟乎丈夫之當弘斯道矣無諍論言無諍之道通於內外子所言須諍者此用末而求本失本而營末者也今為子釋之何則若依外典尋書契之前至淳之世朴質其心行不言之教當於此時民至老死不相往來各得其所復有何諍乎固知本來不諍是物之真矣答曰諍與無諍不可偏執本之與末又安可知繇來不諍寧知非末於今而諍何驗非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為彼彼此之名的居誰處以此言之萬事可知矣本末前後是非善惡可嘗守邪何德自信聰明他耳目夫水泡生滅火輪旋轉八窖穽受羈絆生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曾離善惡生死不能至亦終然至生死故得永離而任放為是以聖人念繞桎之不脫愍黏膠之難離故殷勤教示備諸便巧希向之徒涉求有類雖麟角難成象形易失寧得不髣佛遐路勉勵短晨且當念己身之善惡莫揣他物而欲分別而言我聰明我知見我計較我思惟以此而言亦為矣他人者實難測或可是凡夫真爾亦可是聖人仰同時俗所宜見果報祈應覩安得肆胸襟盡情性而生譏誚乎正應虛已而遊乎世俯仰於電露之間耳明月在天衆水咸見清風至林群籟畢響吾豈逆物哉不入鮑魚不甘腐鼠吾豈同物哉誰能知我共行斯路浩浩乎堂堂乎豈復見有諍為非無諍為是此則諍者自諍無諍者自無諍吾俱取而用之寧勞法師費功夫點筆紙但申於無諍弟子疲唇舌消晷漏惟對於明道戲論於糟粕哉必欲具考真偽暫觀得失無過依賢聖之言檢行藏之理始終考究表裏綜核使浮辭無所用詐道自然消更待後進以觀共妙矣陸瑜為太子中舍人學成實論於僧滔法師通大旨後魏刁雍為征南大將軍泛施愛士恬靜寡欲篤信佛道著教誡二十餘篇以訓導子孫雍子遵為太尉咨議𭆤軍年七十志力不衰嘗經篤疾幾𣦸見神明赦免言是福門之子當享長年裴宣為員外散騎侍郎孝文集沙門請佛經因命宣論難甚有詣理帝稱善高允為尚書散騎嘗侍雅言佛道時設齋講好生惡殺趙柔少以才學知名為河內太守隴西王源賀採佛經幽旨作抵園精舍圖偈六卷柔為之注解咸得理衷為當時雋僧所欽畏焉又立鉻讚頒行於世崔光為車騎大將軍儀同三司崇信佛法禮拜讀誦老而逾甚終日怡怡未曾恚忿曾於門下沓晝坐讀經有鴿飛集膝前遂入于懷緣膝上肩久之乃去道俗讚詠詩誦者數十人每為沙門朝貴請講維摩十地經聽者嘗數百人即為二經義疏三十餘卷識者知其踈略崔敬友光弟也除梁邵太守會遭所生母憂不拜敬友精心佛道晝夜誦經免喪之後遂菜食終世裴植字文遠少而好學覽經史尤長釋典善談理義為度支尚書侍中于忠等矯詔殺之植臨終神志自若遺令子弟命盡之後剪落鬢髮被以法服以沙門禮葬于嵩之陰奚康生久為將及臨州尹多所殺戮而乃信尚佛道數捨其居宅以立寺塔凡歷四州皆有建置孫紹為左衛將軍右光祿大夫記著釋典論雖不直每時有可存胡國珍霛太后之父為中書監年雖篤老而雅敬佛法時事齋潔自強禮拜至於出入侍從猶能跨馬據鞍孝明神龜元年四月七日步從所建佛寺發至閶闔門四五里八日又立觀像晚乃肻坐勞執增甚因遂寢疾馮亮南陽人性清靜隱居嵩高帝嘗詔以為羽林監領中書舍人將令侍讀十地諸經固辭不拜又欲使衣幘入見亮苦求以幅巾就朝遂不強逼還山數年會逆人王敞事發連山中沙門而亮被執赴尚書省十餘日詔特免雪亮不敢還山遂寓居景明寺敕給衣食及其從者數人後思共舊居復還山室亮既雅愛山水又兼巧思結架嵓林甚得栖遊之適頗以此聞宣武結其工力令與沙門統僧暹河南尹甄琛等同視嵩高形勝之處遂造間居佛寺林泉既奇營製又美曲盡山居之妙亮時出京師延昌二年冬因遇篤疾宣武敕以馬舉送令還山居嵩高道場寺數日而卒詔贈帛二百匹以供凶事亮遺誡兄子綜斂以衣幡左手持板右手執孝經一卷置尸磐石之上去人數里外積十餘日乃焚於山以灰燼處起佛塔藏經崔暹宣武時為度支尚書兼僕射魏梁通和要貴皆遣人隨聘使交易暹寄求佛經梁武帝聞之為繕寫以幡花讚唄送至館焉然而好大言調戲無節度密令沙門明藏著佛論而署己名傳諸江表後周蘇綽為度支尚書深信佛理著佛性論七經並行於世隋辛彥之為潞州刺史崇信佛道於城內立浮圖二所並十五層開皇十一年州人張元暴死數日乃蘇云遊天上見新搆一堂制極崇麗元問其故人云潞州刺史辛彥之有功德造此堂以待之彥之聞而不悅其年卒官李士謙趙郡平棘人也為員外郎善談玄理嘗有一客在坐不信佛家應報之義以為外典無聞焉士謙喻之曰積善餘慶積惡餘殃高門待封掃墓望喪豈非俗咎之應邪佛經云輪轉五道無復窮已此則賈誼所言千變萬化未始有極忽然為人之所謂也佛道未東而賢者已知其然矣至若鯀為黃熊杜宇為鶗鵊褒君為龍牛哀為虎君子為鵠小人為猿彭生為豕如意為犬黃母為龜鄧艾為牛徐伯為魚鈴下為烏燕書佐為蛇羊祜前身李氏之子此非佛像變受異形之謂邪客曰邢子才云豈有松柏後身化為樗櫟僕以為然士謙曰此不頻之談也變化皆繇心而作木豈有心乎客人問三教優劣士謙白佛日也道月也儒五星也客亦不能難而止柳誓為煬帝東宮學士太子以其好內典令撰法華玄宗為二十卷奏之太子覽而大悅賞賜優洽儕輩莫與並唐蕭景貞觀中為祕書監尤好內典歷位清通而襟情雅素勵行蔬菲篤沙門之禁誠所得俸祿皆充檀施身終之日家無遺産蕭瑀為金紫光祿大夫專心釋氏嘗修梵行每見沙門大德嘗與之論難及苦空思之所涉必諧微旨太宗以瑀好佛道嘗賚繡佛像一軀并繡瑀形狀於像側以為供養之容又賜王裒所書大品般若經一部并賜袈裟以充講誦之服焉後表乞出家太宗怒之出為商州刺史崔元綜則天朝官至宰相綜篤信釋典好潔細行薰辛不歷口者二十餘年李鼎寶應初為鳳翔尹以百姓所立鼎生祠抗表乞改置佛寺度僧七人許之王維為尚書右丞與弟縉俱奉佛居嘗蔬食不茹葷於藍田南輞口置別業引輞水激流於草堂之下漲深灘於竹中浮輕舟繞溪洞彈琴朗詠嘗飯十數名僧以玄談為樂室中惟有茶鐺藥臼經案繩床而已維早耽禪門深虛心地長齋素食不衣文綵退朝之後嘗焚香獨坐禪誦為事妻亡後三十年孤居一室便絶塵纍王縉為工部侍郎平章事與元載杜鴻漸同居相位俱喜飯僧徒代宗嘗問以福業報應事因而啓奏繇是奉之過當大曆初縉上言妻李氏疾患經今七年請捨道政坊私第為寺度僧三七住持仍乞賜寺額為寶應帝許之李重倩為淮西節度兵馬使抗表請捨所居延壽里宅為佛經坊許之仍賜名寶應一切經坊楊綰為中書侍郎平章事雅尚玄宗道釋二教嘗著王開先生傳以見意梁崇義為山南東道節度大曆末抗表乞以襄陽舊宅為寺許之關播為太子少師善言物理尤精釋氏之學路泌為渾瑊元帥判官隨城與吐蕃會盟而陷既在絶域棲心於釋氏之教為贊普所重待以賓禮劉總為幽州節度使宗長慶初奉詩以私第為佛寺遣中官焦仙晟以寺額曰報恩就賜之又奏請為僧詔授侍中天平軍節度總因乞出家朝廷以緇服就賜之錫名大覺亦以鄆師斧鉞侍中印綬授之唯所趨向而總竟從釋氏幽州上言總剃髮為僧不知在所竟卒於易州韋綬字子章京兆人喪父刺血寫佛經韋處厚為中書侍郎平章事雅信釋氏因果之説晚節尤甚張仲武為幽州節度故事每有新帥多創招提以邀福利仲武日勞人求福何福之有因出已所俸擇吏之清潔者厚給其家使市紙於江南違傭其善書者録其釋氏之典傳之於人因謂其賓客曰此非取福貴助其教化耳梁張策妙通因果酷奉空教未弱冠落髮為僧居雍之慈見精廬頗有高致廣明末大盜犯關策遂返初服奉父母逃難君子多之後為刑部侍郎平章事晉王建立為青州節度晚年歸心釋氏飯僧營寺戒殺慎獄民稍安之桑維翰為侍中天福末奏臣落京章善坊捨宅為僧院乞賜名額勑以奉仙禪院為名和凝為右僕射平章事天福末奏臣滑州捨宅為僧院便令親妹尼福因往被住持乞頒名額兼賜紫衣敕以悟真禪院為名福因宜賜紫衣晉馬㣧孫罷相為太子賓客㣧孫少慕韓愈之為文故不重佛及退居里巷追感唐帝平昔之遇乃依長壽僧舍讀佛書冀申冥報歲餘枕籍黃卷中見華嚴楞詞理富贍繇是酷賞之仍抄録事相形於歌詠謂之法喜集又篡諸經要言為佛國記凡藪千言或囑之日公生平以博奕韓愈為高識何前倨而後恭是佛公邪公佛邪胤孫笑而答曰佛子則多矣李穀顯德中同平章事穀以本貫河南府雒陽縣清風鄉高陽里本居經黃蔡亂離園廬蕩盡穀養於外祖亦其舊墟穀於其地置蘭若命僧居之以申罔極之感
